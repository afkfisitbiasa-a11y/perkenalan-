<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hai aku ismut</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffa6c1 0%, #ff85a2 100%);
      font-family: 'Dancing Script', cursive;
      overflow: hidden;
    }
    h1 {
      color: white;
      font-size: 5rem;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
      animation: glow 2s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .heart {
      position: absolute;
      color: rgba(255, 255, 255, 0.6);
      font-size: 2rem;
      animation: float 6s infinite ease-in;
    }
    @keyframes float {
      0% { transform: translateY(100vh) scale(0); }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>
  <h1>hai aku ismut 💕</h1>
  
  <script>
    // bikin hati jatuh random
    setInterval(() => {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '💖';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = Math.random() * 3 + 3 + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }, 300);
  </script>
</body>
</html>
